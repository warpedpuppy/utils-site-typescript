name: CI

# Continuous verification: typecheck + test suite + core build on every push/PR.
# This is the safety net so red code never reaches a release.

on:
  push:
    branches: [main, phase1-core-library]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Build core first so its dist/ (types + entry) exists before anything
      # typechecks. core's own tests import it by its published name
      # (@utilspalooza/core), which only resolves once dist is present.
      - name: Build core (barrel + docs + tsup)
        run: npm run build --workspace @utilspalooza/core

      - name: Typecheck core (tsc --noEmit)
        run: npm run typecheck --workspace @utilspalooza/core

      - name: Typecheck site (tsc -b)
        run: npx tsc -b

      - name: Test suite
        run: npm test

      # The ordinary suite reads pen payloads from source, which can stay green
      # while minification breaks the shipped bundle. This gate builds dist/ and
      # boots every canonical pen payload out of the served production page.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Production bundle contract
        run: npm run test:production-contract
